name: Release binaries

# Builds self-contained single-file executables for Windows and Linux, each in
# x64 and arm64, and attaches them to the GitHub Release. Push a version tag
# (e.g. `v1.0.0`) to trigger, or run manually from the Actions tab to just build
# the artifacts.
#
# Each x64 runner cross-builds its own OS's arm64 binary too (the SEA blob is
# arch-independent and postject can inject into a downloaded arm64 Node), so no
# ARM runners are required.

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, ubuntu-latest]
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm ci

      - name: Build executables (x64 + arm64)
        run: npm run build:exe
        env:
          TARGET_ARCHES: x64,arm64

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: binaries-${{ runner.os }}
          path: frontend/release/*
          if-no-files-found: error

      - name: Attach to release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: frontend/release/*
