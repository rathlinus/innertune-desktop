name: Release binaries

# Builds the Electron desktop app for Windows (NSIS installer) and Linux
# (AppImage), each in x64 and arm64, and attaches the installers to the GitHub
# Release. Push a version tag (e.g. `v1.0.0`) to trigger, or run manually from
# the Actions tab to just build the artifacts.
#
# Each runner builds its own OS in both arches (electron-builder downloads the
# matching prebuilt Electron), so no ARM runners are required.

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, ubuntu-latest]
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm ci

      - name: Build Electron app (x64 + arm64)
        run: npm run build:electron
        env:
          # electron-builder is happier with a token even for un-published builds.
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: installers-${{ runner.os }}
          path: |
            frontend/release/*.exe
            frontend/release/*.AppImage
          if-no-files-found: error

      - name: Attach to release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            frontend/release/*.exe
            frontend/release/*.AppImage
